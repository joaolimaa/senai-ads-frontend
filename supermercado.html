<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supermecado</title>
    <link rel="icon" href="./assets/carrinho.png" />
    <link rel="stylesheet" href="supermercado.css" />
  </head>

  <body>
    <!--Temos 3 formas de usar o css no projeto, a primeira (ideal) é criar um arquivo separado e puxá-lo dentro da tag head, a segunda usar o css inline e a terceira usar a tag <style> dentro da tag <head> -->
    <h1 class="titulo-principal">Título 1</h1>
    <!--Tag h (vai do 1 ao 6) e representa os títulos em uma página-->

    <p>Olá!</p>
    <!--Tag p (parágrafo), usada para colocar textos na página que criam um espaçamento entre eles-->
    <span>Olá</span>
    <!--Tag span, usada para colocar texto, mas não tem nenhuma adição de mrgens ao redor (texto flutua na página)-->
  </body>
</html>
